<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Test caméra</title>
<style>
  body { margin:0; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; }
  video { width:100%; max-height:70vh; object-fit:cover; }
  button { margin-top:20px; padding:16px 32px; background:#E94560; color:white; border:none; border-radius:12px; font-size:1.1rem; font-weight:700; cursor:pointer; }
  #msg { color:white; margin-top:16px; font-size:0.9rem; text-align:center; padding:0 20px; }
</style>
</head>
<body>
<video id="v" autoplay playsinline muted></video>
<button onclick="start()">▶ Lancer la caméra</button>
<p id="msg">Appuyez sur le bouton</p>
<script>
async function start() {
  const msg = document.getElementById('msg');
  msg.textContent = 'Demande d\'accès...';
  try {
    const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}, audio:false});
    document.getElementById('v').srcObject = s;
    msg.textContent = '✅ Caméra active !';
  } catch(e) {
    msg.textContent = '❌ Erreur : ' + e.name + ' — ' + e.message;
  }
}
</script>
</body>
</html>
